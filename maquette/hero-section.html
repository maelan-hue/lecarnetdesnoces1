<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Le Carnet des noces — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ivoire: #FBF6EF;
    --or: #C7A15A;
    --taupe: #A9967F;
    --encre: #2B2620;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ivoire);
    color: var(--encre);
    font-family: 'Jost', sans-serif;
    padding: 80px 24px;
    display: flex;
    justify-content: center;
  }

  .hero {
    max-width: 640px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--or);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(32px, 5vw, 46px);
    line-height: 1.25;
    color: var(--encre);
    margin-bottom: 22px;
  }

  .subtitle {
    font-size: 16px;
    line-height: 1.7;
    color: #5C5346;
    max-width: 480px;
    margin: 0 auto 44px;
    font-weight: 300;
  }

  .badge-gratuit {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--or);
    border: 1px solid var(--or);
    border-radius: 999px;
    padding: 6px 18px;
    margin-bottom: 44px;
  }

  .features {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px 36px;
    text-align: left;
    margin-bottom: 48px;
  }

  .features li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    margin-top: 2px;
  }

  .icon svg {
    width: 100%;
    height: 100%;
    stroke: var(--or);
    fill: none;
    stroke-width: 1.3;
  }

  .feature-text {
    font-size: 14.5px;
    font-weight: 400;
    color: var(--encre);
    line-height: 1.4;
  }

  .cta {
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ivoire);
    background: var(--encre);
    padding: 16px 40px;
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.25s ease;
  }

  .cta:hover {
    background: var(--or);
  }

  @media (max-width: 480px) {
    .features { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="hero">
    <p class="eyebrow">Le Carnet des noces</p>

    <h1>Votre mariage,<br>tissé avec douceur.</h1>

    <p class="subtitle">
      Un espace pensé pour vous deux, pour que chaque étape se vive sereinement,
      jusqu'au jour où tout prend vie.
    </p>

    <span class="badge-gratuit">100% gratuit</span>

    <ul class="features">
      <li>
        <span class="icon">
          <!-- Budget : pièce / anneau -->
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9 10h4.5a1.5 1.5 0 010 3H9"/></svg>
        </span>
        <span class="feature-text">Budget</span>
      </li>
      <li>
        <span class="icon">
          <!-- Invités -->
          <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.4"/><path d="M4 20c0-3.3 2.2-5.5 5-5.5s5 2.2 5 5.5M15 20c0-2.4 1.4-4.2 3.5-4.6"/></svg>
        </span>
        <span class="feature-text">Invités</span>
      </li>
      <li>
        <span class="icon">
          <!-- Cagnotte : coeur/urne -->
          <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.4-7-9.6C5 7 7.2 5 9.6 5c1 0 2 .5 2.4 1.3C12.4 5.5 13.4 5 14.4 5 16.8 5 19 7 19 10.4 19 15.6 12 20 12 20z"/></svg>
        </span>
        <span class="feature-text">Cagnotte</span>
      </li>
      <li>
        <span class="icon">
          <!-- Site de mariage -->
          <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="1"/><path d="M4 9h16M9 13h6M9 16h4"/></svg>
        </span>
        <span class="feature-text">Site de mariage</span>
      </li>
      <li style="grid-column: 1 / -1; justify-content: center;">
        <span class="icon">
          <!-- Prestataires du 66 : marqueur -->
          <svg viewBox="0 0 24 24"><path d="M12 21s-6.5-6-6.5-11A6.5 6.5 0 0112 3a6.5 6.5 0 016.5 6.5C18.5 15 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.2"/></svg>
        </span>
        <span class="feature-text">Prestataires triés dans le 66</span>
      </li>
    </ul>

    <a href="#" class="cta">Commencer mon carnet</a>
  </div>

</body>
</html>
